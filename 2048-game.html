<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 — The Puzzle</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a;
    --surface: #161829;
    --surface2: #1e2140;
    --border: #2a2d4a;
    --text: #e8e6f0;
    --text-dim: #8a87a8;
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.25);
    --cell-empty: #1e2140;
    --radius: 14px;
    --grid-gap: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(245, 158, 11, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
    animation: bgShift 20s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-5%, 3%) rotate(3deg); }
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }

  /* HEADER */
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .game-logo {
    font-family: 'Space Mono', monospace;
    font-size: 2.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
    line-height: 1;
  }

  .score-panel {
    display: flex;
    gap: 10px;
  }

  .score-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 16px;
    text-align: center;
    min-width: 80px;
    position: relative;
    overflow: hidden;
  }

  .score-box::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #8b5cf6);
    opacity: 0.6;
  }

  .score-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    font-weight: 600;
  }

  .score-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .score-add {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    pointer-events: none;
    animation: scoreFloat 0.7s ease-out forwards;
    z-index: 10;
  }

  @keyframes scoreFloat {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(1.3); }
  }

  /* CONTROLS */
  .controls-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .ctrl-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .ctrl-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .ctrl-btn:disabled:hover {
    background: var(--surface);
    color: var(--text-dim);
    border-color: var(--border);
    box-shadow: none;
  }

  .ctrl-btn svg { width: 16px; height: 16px; }

  .moves-counter {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 8px 0;
    cursor: default;
  }

  /* GRID */
  .grid-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: var(--grid-gap);
    position: relative;
    touch-action: none;
    aspect-ratio: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .grid-bg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: var(--grid-gap);
    width: 100%;
    height: 100%;
  }

  .cell-bg {
    background: var(--cell-empty);
    border-radius: var(--radius);
  }

  .tiles-layer {
    position: absolute;
    top: var(--grid-gap);
    left: var(--grid-gap);
    right: var(--grid-gap);
    bottom: var(--grid-gap);
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    transition: top 0.12s ease, left 0.12s ease;
    z-index: 1;
  }

  .tile.new-tile {
    animation: tileAppear 0.2s ease-out;
  }

  .tile.merged-tile {
    animation: tileMerge 0.25s ease;
    z-index: 2;
  }

  @keyframes tileAppear {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes tileMerge {
    0% { transform: scale(1); }
    40% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* TILE COLORS */
  .tile-2    { background: #2a2d4a; color: #c4c1d8; font-size: 2rem; }
  .tile-4    { background: #33365a; color: #d4d1e8; font-size: 2rem; }
  .tile-8    { background: #c2410c; color: #fff; font-size: 2rem; }
  .tile-16   { background: #dc2626; color: #fff; font-size: 1.9rem; }
  .tile-32   { background: #e11d48; color: #fff; font-size: 1.9rem; }
  .tile-64   { background: #db2777; color: #fff; font-size: 1.9rem; }
  .tile-128  { background: #f59e0b; color: #1a1a2e; font-size: 1.6rem; box-shadow: 0 0 20px rgba(245,158,11,0.3); }
  .tile-256  { background: #eab308; color: #1a1a2e; font-size: 1.6rem; box-shadow: 0 0 24px rgba(234,179,8,0.35); }
  .tile-512  { background: #a855f7; color: #fff; font-size: 1.6rem; box-shadow: 0 0 24px rgba(168,85,247,0.35); }
  .tile-1024 { background: #7c3aed; color: #fff; font-size: 1.35rem; box-shadow: 0 0 28px rgba(124,58,237,0.4); }
  .tile-2048 { background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6); color: #fff; font-size: 1.35rem; box-shadow: 0 0 40px rgba(245,158,11,0.5); }
  .tile-super { background: linear-gradient(135deg, #06b6d4, #8b5cf6, #ec4899); color: #fff; font-size: 1.1rem; box-shadow: 0 0 50px rgba(139,92,246,0.5); }

  /* OVERLAY */
  .game-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13, 15, 26, 0.85);
    backdrop-filter: blur(6px);
    border-radius: 18px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }

  .game-overlay.active { display: flex; }

  .overlay-title {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
  }

  .overlay-title.win {
    background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 2.4rem;
  }

  .overlay-sub { color: var(--text-dim); font-size: 0.95rem; }

  .overlay-btn {
    background: var(--accent);
    color: #1a1a2e;
    border: none;
    border-radius: 12px;
    padding: 12px 32px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  .overlay-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .overlay-btn.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* FOOTER */
  .game-footer {
    text-align: center;
    margin-top: 16px;
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 1px;
  }

  .game-footer kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 7px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .game-wrapper { padding: 12px; }
    .game-logo { font-size: 2.2rem; }
    .score-box { min-width: 64px; padding: 4px 10px; }
    .score-value { font-size: 1.1rem; }
    .tile-2, .tile-4, .tile-8, .tile-16, .tile-32, .tile-64 { font-size: 1.5rem; }
    .tile-128, .tile-256, .tile-512 { font-size: 1.25rem; }
    .tile-1024, .tile-2048 { font-size: 1.1rem; }
    .tile-super { font-size: 0.9rem; }
    .overlay-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- HEADER -->
  <div class="game-header">
    <div class="game-logo">2048</div>
    <div class="score-panel">
      <div class="score-box" id="scoreBox">
        <div class="score-label">Score</div>
        <div class="score-value" id="currentScore">0</div>
      </div>
      <div class="score-box" id="bestBox">
        <div class="score-label">Best</div>
        <div class="score-value" id="bestScore">0</div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-bar">
    <button class="ctrl-btn" id="btnNew" onclick="startNewGame()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      New
    </button>
    <button class="ctrl-btn" id="btnUndo" onclick="undoMove()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      Undo
    </button>
    <div class="moves-counter">
      MOVES: <span id="moveCount">0</span>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-container" id="gridContainer">
    <div class="grid-bg">
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
    </div>
    <div class="tiles-layer" id="tilesLayer"></div>

    <!-- OVERLAYS -->
    <div class="game-overlay" id="gameOverOverlay">
      <div class="overlay-title">Game Over</div>
      <div class="overlay-sub" id="finalScoreText">Score: 0</div>
      <button class="overlay-btn" onclick="startNewGame()">Try Again</button>
    </div>
    <div class="game-overlay" id="winOverlay">
      <div class="overlay-title win">YOU WIN!</div>
      <div class="overlay-sub">You reached 2048!</div>
      <button class="overlay-btn" onclick="continueGame()">Keep Going</button>
      <button class="overlay-btn secondary" onclick="startNewGame()">New Game</button>
    </div>
  </div>

  <div class="game-footer">
    <kbd>←</kbd> <kbd>→</kbd> <kbd>↑</kbd> <kbd>↓</kbd> to move &nbsp;·&nbsp; swipe on mobile &nbsp;·&nbsp; <kbd>Z</kbd> undo
  </div>
</div>

<script>
// ==================== GAME ENGINE ====================
const SIZE = 4;
let grid, score, bestScore, moves, prevState, won, continueAfterWin, tileIdCounter;

function init() {
  bestScore = parseInt(localStorage.getItem('best2048') || '0', 10);
  document.getElementById('bestScore').textContent = bestScore;
  startNewGame();
}

function startNewGame() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0;
  moves = 0;
  prevState = null;
  won = false;
  continueAfterWin = false;
  tileIdCounter = 0;

  document.getElementById('gameOverOverlay').classList.remove('active');
  document.getElementById('winOverlay').classList.remove('active');
  document.getElementById('btnUndo').disabled = true;
  updateScoreDisplay();
  updateMovesDisplay();

  addRandomTile();
  addRandomTile();
  renderGrid();
}

function addRandomTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push({ r, c });
  if (empty.length === 0) return null;
  const spot = empty[Math.floor(Math.random() * empty.length)];
  grid[spot.r][spot.c] = Math.random() < 0.9 ? 2 : 4;
  return spot;
}

function cloneGrid(g) { return g.map(row => [...row]); }

function move(dir) {
  const oldGrid = cloneGrid(grid);
  const oldScore = score;

  let moved = false;
  let mergedPositions = [];

  // Rotate grid so we always process left-to-right
  const rotated = rotateGrid(grid, dir);
  const result = processLeft(rotated);
  grid = rotateGrid(result.grid, (4 - dir) % 4);
  moved = result.moved;
  score += result.points;

  // Translate merged positions back
  mergedPositions = result.mergedCols.map(({ r, c }) => {
    let nr = r, nc = c;
    for (let i = 0; i < (4 - dir) % 4; i++) {
      const tmp = nr;
      nr = nc;
      nc = SIZE - 1 - tmp;
    }
    return { r: nr, c: nc };
  });

  if (!moved) return;

  prevState = { grid: oldGrid, score: oldScore, moves };
  document.getElementById('btnUndo').disabled = false;
  moves++;
  updateMovesDisplay();

  const newSpot = addRandomTile();
  renderGrid(newSpot, mergedPositions);
  updateScoreDisplay();

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('best2048', bestScore);
    document.getElementById('bestScore').textContent = bestScore;
  }

  // Check win
  if (!won && !continueAfterWin) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 2048) { won = true; showWin(); return; }
  }

  // Check game over
  if (isGameOver()) showGameOver();
}

function rotateGrid(g, times) {
  let result = cloneGrid(g);
  for (let t = 0; t < times; t++) {
    const newG = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        newG[c][SIZE - 1 - r] = result[r][c];
    result = newG;
  }
  return result;
}

// dir: 0=left, 1=up, 2=right, 3=down
function processLeft(g) {
  const newG = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  let points = 0;
  let moved = false;
  let mergedCols = [];

  for (let r = 0; r < SIZE; r++) {
    let writePos = 0;
    let lastVal = 0;
    let lastWritePos = -1;

    for (let c = 0; c < SIZE; c++) {
      const val = g[r][c];
      if (val === 0) continue;

      if (lastVal === val && lastWritePos >= 0) {
        newG[r][lastWritePos] = val * 2;
        points += val * 2;
        mergedCols.push({ r, c: lastWritePos });
        lastVal = 0;
        lastWritePos = -1;
        moved = true;
      } else {
        if (writePos !== c) moved = true;
        newG[r][writePos] = val;
        lastVal = val;
        lastWritePos = writePos;
        writePos++;
      }
    }
  }

  return { grid: newG, points, moved, mergedCols };
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return false;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
    }
  return true;
}

function undoMove() {
  if (!prevState) return;
  grid = prevState.grid;
  score = prevState.score;
  moves = prevState.moves;
  prevState = null;
  document.getElementById('btnUndo').disabled = true;
  document.getElementById('gameOverOverlay').classList.remove('active');
  updateScoreDisplay();
  updateMovesDisplay();
  renderGrid();
}

// ==================== RENDERING ====================
function renderGrid(newSpot, mergedPositions) {
  const layer = document.getElementById('tilesLayer');
  layer.innerHTML = '';

  const containerRect = layer.getBoundingClientRect();
  const gap = 10;
  const cellSize = (containerRect.width - gap * 3) / 4;

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const val = grid[r][c];
      if (val === 0) continue;

      const tile = document.createElement('div');
      const tileClass = val <= 2048 ? `tile-${val}` : 'tile-super';
      tile.className = `tile ${tileClass}`;

      if (newSpot && newSpot.r === r && newSpot.c === c) {
        tile.classList.add('new-tile');
      }
      if (mergedPositions && mergedPositions.some(p => p.r === r && p.c === c)) {
        tile.classList.add('merged-tile');
      }

      tile.style.width = `${cellSize}px`;
      tile.style.height = `${cellSize}px`;
      tile.style.top = `${r * (cellSize + gap)}px`;
      tile.style.left = `${c * (cellSize + gap)}px`;
      tile.textContent = val;

      layer.appendChild(tile);
    }
  }
}

function updateScoreDisplay() {
  document.getElementById('currentScore').textContent = score;
}

function updateMovesDisplay() {
  document.getElementById('moveCount').textContent = moves;
}

function showScoreAnimation(points) {
  if (points <= 0) return;
  const box = document.getElementById('scoreBox');
  const anim = document.createElement('div');
  anim.className = 'score-add';
  anim.textContent = `+${points}`;
  box.appendChild(anim);
  setTimeout(() => anim.remove(), 700);
}

function showGameOver() {
  document.getElementById('finalScoreText').textContent = `Final Score: ${score}`;
  document.getElementById('gameOverOverlay').classList.add('active');
}

function showWin() {
  document.getElementById('winOverlay').classList.add('active');
}

function continueGame() {
  continueAfterWin = true;
  document.getElementById('winOverlay').classList.remove('active');
}

// ==================== INPUT HANDLING ====================
// Keyboard
document.addEventListener('keydown', (e) => {
  const dirMap = { ArrowLeft: 0, ArrowUp: 1, ArrowRight: 2, ArrowDown: 3 };
  if (e.key in dirMap) {
    e.preventDefault();
    const oldScore = score;
    move(dirMap[e.key]);
    showScoreAnimation(score - oldScore);
  }
  if (e.key === 'z' || e.key === 'Z') undoMove();
});

// Touch / Swipe
let touchStartX, touchStartY;
const gridEl = document.getElementById('gridContainer');

gridEl.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

gridEl.addEventListener('touchend', (e) => {
  if (touchStartX === undefined) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < 30) return; // too small

  let dir;
  if (absDx > absDy) {
    dir = dx > 0 ? 2 : 0;
  } else {
    dir = dy > 0 ? 3 : 1;
  }

  const oldScore = score;
  move(dir);
  showScoreAnimation(score - oldScore);
  touchStartX = undefined;
}, { passive: true });

// Resize handler
window.addEventListener('resize', () => renderGrid());

// INIT
init();
</script>
</body>
</html>
